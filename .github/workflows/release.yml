name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_changed: ${{ steps.check-version.outputs.changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed in pyproject.toml
        id: check-version
        run: |
          BEFORE=$(git show HEAD~1:pyproject.toml | python3 -c "import sys,tomllib; print(tomllib.load(sys.stdin.buffer)['project']['version'])")
          AFTER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: $BEFORE -> $AFTER"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No version change detected ($AFTER)"
          fi

      - name: Extract version from pyproject.toml
        if: steps.check-version.outputs.changed == 'true'
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag already exists
        if: steps.check-version.outputs.changed == 'true'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git tag -l "$TAG" | grep -q .; then
            echo "Error: Tag $TAG already exists"
            exit 1
          fi

      - name: Create and push tag
        if: steps.check-version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  build-distributions:
    needs: tag-and-release
    if: needs.tag-and-release.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Prepare temp directory
        run: mkdir -p "$RUNNER_TEMP/zivo-tmp"

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Run tests
        run: TMPDIR="$RUNNER_TEMP/zivo-tmp" uv run pytest

      - name: Build source distribution
        run: |
          uv build --sdist --out-dir dist

      - name: Build wheel
        run: |
          uv build --wheel --out-dir dist

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build-distributions

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi:
    runs-on: ubuntu-latest
    needs:
      - build-distributions
      - publish-testpypi

    steps:
      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Wait for package availability on TestPyPI
        env:
          VERSION: ${{ needs.build-distributions.outputs.version }}
        run: |
          uv venv .testpypi-venv
          for attempt in $(seq 1 10); do
            if uv pip install \
              --python .testpypi-venv/bin/python \
              --refresh \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              --index-strategy unsafe-best-match \
              "zivo==${VERSION}"; then
              exit 0
            fi
            echo "Package not available yet on TestPyPI, retrying..."
            sleep 15
          done
          echo "Failed to install zivo==${VERSION} from TestPyPI"
          exit 1

      - name: Verify installed package import
        run: .testpypi-venv/bin/python -c "import zivo; import zivo.__main__"

  publish-pypi:
    runs-on: ubuntu-latest
    needs: verify-testpypi
    environment:
      name: pypi
      url: https://pypi.org/p/zivo

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

  create-github-release:
    runs-on: ubuntu-latest
    needs:
      - build-distributions
      - publish-pypi

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-distributions.outputs.version }}
          name: zivo ${{ needs.build-distributions.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
