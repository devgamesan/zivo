name: Performance Benchmark

on:
  # 手動実行
  workflow_dispatch:
    inputs:
      benchmark_type:
        description: 'Benchmark type to run'
        required: true
        default: 'quick'
        type: choice
        options:
        - quick
        - full
      iterations:
        description: 'Number of iterations for timing measurements'
        required: false
        default: '5'
        type: string

  # PR での自動実行（src/peneo/**/*.py に変更がある場合）
  pull_request:
    paths:
      - 'src/peneo/**/*.py'

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: uv sync --dev

      - name: Determine benchmark type
        id: benchmark_type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ github.event.inputs.benchmark_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=quick" >> $GITHUB_OUTPUT
          fi

      - name: Run quick benchmarks
        if: steps.benchmark_type.outputs.type == 'quick'
        run: |
          echo "Running quick benchmarks..."
          uv run pytest tests/test_benchmarks.py::TestQuickBenchmarks -v --durations=0 --tb=short

      - name: Run full benchmarks
        if: steps.benchmark_type.outputs.type == 'full'
        run: |
          echo "Running full benchmarks..."
          uv run pytest tests/test_benchmarks.py -v --durations=0 --tb=short

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ steps.benchmark_type.outputs.type }}
          path: |
            pytest-logs.txt
            benchmark-results.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && steps.benchmark_type.outputs.type == 'quick'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## Benchmark Results

            Quick benchmarks completed. See workflow run for details.

            - Type: ${{ steps.benchmark_type.outputs.type }}
            - Run: #${{ github.run_number }}
            - Logs: [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
