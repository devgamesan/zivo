name: Python CI

on:
  push:
    branches:
      - main
      - develop
      - feat/windows
  pull_request:
    branches:
      - main
      - develop
      - feat/windows

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ripgrep

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ripgrep

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ripgrep -y

      - name: Install dependencies
        run: uv sync --dev

      - name: Prepare temp directory
        run: >
          uv run python -c "from pathlib import Path; import os;
          Path(os.environ['RUNNER_TEMP'], 'zivo-tmp').mkdir(parents=True, exist_ok=True)"

      - name: Lint
        run: uv run ruff check .

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          TMPDIR: ${{ runner.temp }}/zivo-tmp
          TMP: ${{ runner.temp }}/zivo-tmp
          TEMP: ${{ runner.temp }}/zivo-tmp
        run: uv run pytest

      - name: Test (Windows regression subset)
        if: runner.os == 'Windows'
        env:
          TMPDIR: ${{ runner.temp }}/zivo-tmp
          TMP: ${{ runner.temp }}/zivo-tmp
          TEMP: ${{ runner.temp }}/zivo-tmp
        run: >
          uv run pytest
          tests/test_adapters_file_operations.py
          tests/test_services_clipboard_operations.py
          tests/test_services_file_mutations.py
          tests/test_services_archive_extract.py
          tests/test_services_zip_compress.py
          tests/test_services_file_search.py
          tests/test_services_grep_search.py
          tests/test_services_text_replace.py
          tests/test_services_config.py
